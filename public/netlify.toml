[build]
  publish = "."
  command = "# no build step"

[[redirects]]
  from = "/healthz"
  to = "https://nextmetro.onrender.com/healthz"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "https://nextmetro.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
